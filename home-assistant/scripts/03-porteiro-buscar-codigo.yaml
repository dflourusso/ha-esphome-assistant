# UI: Scripts → Criar script → ⋮ → Editar em YAML — cole abaixo (sem linha id:)
# Alias: porteiro buscar codigo
# ⚙️ ID da entidade OBRIGATÓRIO: porteiro_buscar_codigo (→ script.porteiro_buscar_codigo)
#
# O código de entrega é o summary do item em todo.entregas.
alias: porteiro buscar codigo
mode: single
description: Busca summary (= código) na lista todo.entregas.
fields:
  code:
    name: Código (summary)
    required: true
    selector:
      text:
sequence:
  - variables:
      # ~ '' impede o HA de guardar 123 como int
      search_code: "{{ '' ~ (code | string | trim | upper | replace(' ', '')) }}"

  - action: todo.get_items
    target:
      entity_id: todo.entregas
    data:
      status:
        - needs_action
        - completed
    response_variable: delivery_list

  - variables:
      match_code: >-
        {%- for item in delivery_list['todo.entregas']['items'] -%}
          {%- if (item.summary | string | trim | upper) == (search_code | string | trim | upper) -%}
            {{- '' ~ (item.summary | string | trim | upper) -}}
          {%- endif -%}
        {%- endfor -%}
      match_description: >-
        {%- for item in delivery_list['todo.entregas']['items'] -%}
          {%- if (item.summary | string | trim | upper) == (search_code | string | trim | upper) -%}
            {{- item.description | default('') -}}
          {%- endif -%}
        {%- endfor -%}
      match_uid: >-
        {%- for item in delivery_list['todo.entregas']['items'] -%}
          {%- if (item.summary | string | trim | upper) == (search_code | string | trim | upper) -%}
            {{- item.uid -}}
          {%- endif -%}
        {%- endfor -%}
      match_status: >-
        {%- for item in delivery_list['todo.entregas']['items'] -%}
          {%- if (item.summary | string | trim | upper) == (search_code | string | trim | upper) -%}
            {{- item.status | default('') -}}
          {%- endif -%}
        {%- endfor -%}

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ match_uid | default('') | string | trim != ''
                 and (match_status | default('') | string | trim) != 'completed' }}
        sequence:
          - action: todo.update_item
            target:
              entity_id: todo.entregas
            data:
              item: "{{ match_uid | string | trim }}"
              status: completed

  - variables:
      result:
        found: "{{ match_uid | default('') | string | trim != '' }}"
        already_completed: >-
          {{ match_uid | default('') | string | trim != ''
             and (match_status | default('') | string | trim) == 'completed' }}
        code: "{{ '' ~ (match_code | string | trim) }}"
        description: >-
          {% set desc = match_description | trim %}
          {% if 'description:' in desc | lower %}
            {{ desc.split('description:')[-1].split('keyword:')[0].split('\n')[0] | trim }}
          {% else %}
            {{ desc }}
          {% endif %}
        keyword: >-
          {% set desc = match_description | trim %}
          {% if 'keyword:' in desc | lower %}
            {{ desc.split('keyword:')[-1].split('\n')[0] | trim }}
          {% else %}{% endif %}

  - stop: done
    response_variable: result
