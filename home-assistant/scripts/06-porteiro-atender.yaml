# UI: Scripts → Criar script → ⋮ → Editar em YAML — cole abaixo (sem linha id:)
# O alias vira entity_id: script.porteiro_atender
alias: porteiro atender
mode: restart
description: Loop recepcionista com ask_question + conversation.process (+ persistent notification).
variables:
  satellite: assist_satellite.garagem_dfltech_assistant_assist_satellite
  agent: conversation.porteiro
  max_turns: 15
  conversation_id: ""
  transcript: ""
  log_id: "porteiro_{{ now().strftime('%Y%m%d_%H%M%S') }}"
  log_title: "Porteiro {{ now().strftime('%d/%m/%Y %H:%M') }}"
  saudacao: >-
    {% set h = now().hour %}
    {% if h >= 5 and h < 12 %}Bom dia{% elif h >= 12 and h < 18 %}Boa tarde{% else %}Boa noite{% endif %}
  next_question: "{{ saudacao }}. Em que posso ajudar?"
sequence:
  # Só age se o ESP estiver com Assist ativo (ex. campainha). Se já idle, segue na hora.
  - action: script.porteiro_parar_conversa

  - variables:
      transcript: |-
        {{ transcript }}
        **Início** — {{ now().strftime('%d/%m/%Y %H:%M:%S') }}
        _{{ next_question }}_

  - action: script.porteiro_log
    data:
      notification_id: "{{ log_id }}"
      title: "{{ log_title }}"
      message: |-
        {{ transcript | trim }}

  - repeat:
      count: "{{ max_turns | int }}"
      sequence:
        - action: script.porteiro_aguardar_idle

        - action: assist_satellite.ask_question
          data:
            entity_id: "{{ satellite }}"
            question: "{{ next_question }}"
            preannounce: false
          response_variable: user_turn
          continue_on_error: true

        - choose:
            - conditions:
                - condition: template
                  value_template: >-
                    {{ user_turn is defined
                       and user_turn.sentence is defined
                       and user_turn.sentence | trim != '' }}
              sequence:
                - choose:
                    - conditions:
                        - condition: template
                          value_template: "{{ conversation_id | trim != '' }}"
                      sequence:
                        - action: conversation.process
                          data:
                            agent_id: "{{ agent }}"
                            text: "{{ user_turn.sentence }}"
                            conversation_id: "{{ conversation_id }}"
                            language: pt-BR
                          response_variable: agent_response
                          continue_on_error: true
                    - conditions: []
                      sequence:
                        - action: conversation.process
                          data:
                            agent_id: "{{ agent }}"
                            text: "{{ user_turn.sentence }}"
                            language: pt-BR
                          response_variable: agent_response
                          continue_on_error: true

                - choose:
                    - conditions:
                        - condition: template
                          value_template: >-
                            {{ agent_response is defined
                               and agent_response.response is defined
                               and agent_response.response.speech is defined
                               and agent_response.response.speech.plain is defined }}
                      sequence:
                        - variables:
                            conversation_id: "{{ agent_response.conversation_id }}"
                            parsed: >-
                              {% set raw = agent_response.response.speech.plain.speech | trim %}
                              {% if raw.startswith('{') %}
                                {{ raw | from_json }}
                              {% else %}
                                {{ {'speech': raw, 'type': 'geral', 'code': '', 'summary': '', 'end': false, 'code_method': ''} }}
                              {% endif %}
                            speech: "{{ parsed.speech | default('Desculpe, não entendi. Pode repetir?') }}"
                            type: "{{ parsed.type | default('geral') }}"
                            code: >-
                              {% set c = parsed.code | default('') | string | trim %}
                              {{ '' if c | lower in ['null', 'none', ''] else '' ~ (c | upper | replace(' ', '')) }}
                            end: >-
                              {% set c = parsed.code | default('') | string | trim %}
                              {% set has_code = c != '' and c | lower not in ['null', 'none'] %}
                              {% set t = parsed.type | default('geral') %}
                              {% set met = parsed.code_method | default('') | string | trim | lower %}
                              {{ false if t == 'entrega' and (has_code or met == 'camera') else (parsed.end | default(false) | bool) }}
                            summary: "{{ parsed.summary | default('') | string | trim }}"
                            code_method: "{{ parsed.code_method | default('') | string | trim | lower }}"
                    - conditions: []
                      sequence:
                        - variables:
                            speech: >-
                              Desculpe, tive um problema ao falar com o agente.
                              Pode repetir?
                            type: geral
                            code: ""
                            end: false
                            summary: ""
                            code_method: ""

                - variables:
                    transcript: |-
                      {{ transcript }}
                      - **Visitante:** {{ user_turn.sentence }}
                      - **Porteiro:** {{ speech }}
                      {% if type | trim != '' %}  - _tipo: {{ type }}{% if code | string | trim != '' %} · código: {{ code }}{% endif %}{% if code_method | trim != '' %} · {{ code_method }}{% endif %}_{% endif %}

                - action: script.porteiro_log
                  data:
                    notification_id: "{{ log_id }}"
                    title: "{{ log_title }}"
                    message: |-
                      {{ transcript | trim }}

                - choose:
                            - conditions:
                                - condition: template
                                  value_template: "{{ type == 'vendedor' }}"
                              sequence:
                                - action: script.porteiro_aguardar_idle

                                - action: assist_satellite.announce
                                  data:
                                    entity_id: "{{ satellite }}"
                                    message: "{{ speech }}"
                                    preannounce: false

                                - action: script.porteiro_aguardar_idle

                                - action: script.porteiro_parar_conversa

                                - variables:
                                    transcript: |-
                                      {{ transcript }}
                                      ---
                                      **Fim:** vendedor dispensado

                                - action: script.porteiro_log
                                  data:
                                    notification_id: "{{ log_id }}"
                                    title: "{{ log_title }}"
                                    message: |-
                                      {{ transcript | trim }}

                                - stop: vendedor_encerrado

                            - conditions:
                                - condition: template
                                  value_template: >-
                                    {{ end
                                       and summary | trim != ''
                                       and (type == 'visita' or type == 'geral'
                                            or (type == 'entrega' and code | string | trim == '')) }}
                              sequence:
                                - action: script.porteiro_notificar_morador
                                  data:
                                    title: >-
                                      {% if type == 'visita' %}Porteiro - visita
                                      {% elif type == 'entrega' %}Porteiro - delivery
                                      {% else %}Porteiro - garagem{% endif %}
                                    message: "{{ summary }}"

                                - action: script.porteiro_aguardar_idle

                                - action: assist_satellite.announce
                                  data:
                                    entity_id: "{{ satellite }}"
                                    message: "{{ speech }}"
                                    preannounce: false

                                - action: script.porteiro_aguardar_idle

                                - action: script.porteiro_parar_conversa

                                - variables:
                                    transcript: |-
                                      {{ transcript }}
                                      ---
                                      **Fim:** {{ type }} — {{ summary }}

                                - action: script.porteiro_log
                                  data:
                                    notification_id: "{{ log_id }}"
                                    title: "{{ log_title }}"
                                    message: |-
                                      {{ transcript | trim }}

                                - stop: atendimento_encerrado

                            - conditions:
                                - condition: template
                                  value_template: >-
                                    {{ type == 'entrega'
                                       and code_method == 'camera'
                                       and code | string | trim == '' }}
                              sequence:
                                - action: script.porteiro_aguardar_idle

                                - action: assist_satellite.announce
                                  data:
                                    entity_id: "{{ satellite }}"
                                    message: "{{ speech }}"
                                    preannounce: false

                                - action: script.porteiro_aguardar_idle

                                - action: script.porteiro_ler_codigo_camera
                                  response_variable: camera_reading

                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ camera_reading.found | default(false) | bool }}"
                                      sequence:
                                        - action: script.porteiro_confirmar_entrega
                                          data:
                                            code: "{{ camera_reading.code }}"
                                          response_variable: confirmation

                                        - choose:
                                            - conditions:
                                                - condition: template
                                                  value_template: "{{ confirmation.completed | default(false) | bool }}"
                                              sequence:
                                                - variables:
                                                    transcript: |-
                                                      {{ transcript }}
                                                      - **Sistema:** código pela câmera validado (`{{ camera_reading.code }}`)
                                                      - **Porteiro:** {{ confirmation.courier_message | default('') | trim }}
                                                      ---
                                                      **Fim:** entrega concluída

                                                - action: script.porteiro_log
                                                  data:
                                                    notification_id: "{{ log_id }}"
                                                    title: "{{ log_title }}"
                                                    message: |-
                                                      {{ transcript | trim }}

                                                - stop: entrega_concluida

                                            - conditions: []
                                              sequence:
                                                - action: conversation.process
                                                  data:
                                                    agent_id: "{{ agent }}"
                                                    text: >-
                                                      [Sistema: li o código {{ camera_reading.code }} pela câmera,
                                                      mas não foi encontrado na lista. Peça para repetir por voz
                                                      (code_method voz) ou tentar a câmera de novo.]
                                                    conversation_id: "{{ conversation_id }}"
                                                    language: pt-BR
                                                  response_variable: agent_response
                                                  continue_on_error: true

                                                - variables:
                                                    parsed: >-
                                                      {% set raw = agent_response.response.speech.plain.speech | trim %}
                                                      {% if raw.startswith('{') %}
                                                        {{ raw | from_json }}
                                                      {% else %}
                                                        {{ {'speech': raw} }}
                                                      {% endif %}
                                                    speech: "{{ parsed.speech | default('Não encontrei esse código. Pode falar devagar ou tentar pela câmera de novo?') }}"
                                                    summary: "{{ parsed.summary | default('') | string | trim }}"
                                                    end: "{{ parsed.end | default(false) | bool }}"

                                                - variables:
                                                    transcript: |-
                                                      {{ transcript }}
                                                      - **Sistema:** código pela câmera não encontrado (`{{ camera_reading.code }}`)
                                                      - **Porteiro:** {{ speech }}

                                                - action: script.porteiro_log
                                                  data:
                                                    notification_id: "{{ log_id }}"
                                                    title: "{{ log_title }}"
                                                    message: |-
                                                      {{ transcript | trim }}

                                                - choose:
                                                    - conditions:
                                                        - condition: template
                                                          value_template: >-
                                                            {{ end and summary | trim != '' }}
                                                      sequence:
                                                        - action: script.porteiro_notificar_morador
                                                          data:
                                                            title: Porteiro - delivery
                                                            message: "{{ summary }}"

                                                        - action: script.porteiro_aguardar_idle

                                                        - action: assist_satellite.announce
                                                          data:
                                                            entity_id: "{{ satellite }}"
                                                            message: "{{ speech }}"
                                                            preannounce: false

                                                        - action: script.porteiro_aguardar_idle

                                                        - action: script.porteiro_parar_conversa

                                                        - variables:
                                                            transcript: |-
                                                              {{ transcript }}
                                                              ---
                                                              **Fim:** avisou morador — {{ summary }}

                                                        - action: script.porteiro_log
                                                          data:
                                                            notification_id: "{{ log_id }}"
                                                            title: "{{ log_title }}"
                                                            message: |-
                                                              {{ transcript | trim }}

                                                        - stop: entrega_aviso_morador

                                                    - conditions: []
                                                      sequence:
                                                        - variables:
                                                            next_question: "{{ speech }}"

                                    - conditions: []
                                      sequence:
                                        - action: conversation.process
                                          data:
                                            agent_id: "{{ agent }}"
                                            text: >-
                                              [Sistema: não consegui ler o código pela câmera.
                                              Ofereça o entregador falar o código (code_method voz)
                                              ou tentar posicionar o pacote de novo (code_method camera).]
                                            conversation_id: "{{ conversation_id }}"
                                            language: pt-BR
                                          response_variable: agent_response
                                          continue_on_error: true

                                        - variables:
                                            parsed: >-
                                              {% set raw = agent_response.response.speech.plain.speech | trim %}
                                              {% if raw.startswith('{') %}
                                                {{ raw | from_json }}
                                              {% else %}
                                                {{ {'speech': raw} }}
                                              {% endif %}
                                            speech: "{{ parsed.speech | default('Não consegui ler o código. Pode falar devagar ou posicionar o pacote de novo?') }}"
                                            summary: "{{ parsed.summary | default('') | string | trim }}"
                                            end: "{{ parsed.end | default(false) | bool }}"

                                        - variables:
                                            transcript: |-
                                              {{ transcript }}
                                              - **Sistema:** câmera sem leitura
                                              - **Porteiro:** {{ speech }}

                                        - action: script.porteiro_log
                                          data:
                                            notification_id: "{{ log_id }}"
                                            title: "{{ log_title }}"
                                            message: |-
                                              {{ transcript | trim }}

                                        - choose:
                                            - conditions:
                                                - condition: template
                                                  value_template: >-
                                                    {{ end and summary | trim != '' }}
                                              sequence:
                                                - action: script.porteiro_notificar_morador
                                                  data:
                                                    title: Porteiro - delivery
                                                    message: "{{ summary }}"

                                                - action: script.porteiro_aguardar_idle

                                                - action: assist_satellite.announce
                                                  data:
                                                    entity_id: "{{ satellite }}"
                                                    message: "{{ speech }}"
                                                    preannounce: false

                                                - action: script.porteiro_aguardar_idle

                                                - action: script.porteiro_parar_conversa

                                                - variables:
                                                    transcript: |-
                                                      {{ transcript }}
                                                      ---
                                                      **Fim:** avisou morador — {{ summary }}

                                                - action: script.porteiro_log
                                                  data:
                                                    notification_id: "{{ log_id }}"
                                                    title: "{{ log_title }}"
                                                    message: |-
                                                      {{ transcript | trim }}

                                                - stop: entrega_aviso_morador

                                            - conditions: []
                                              sequence:
                                                - variables:
                                                    next_question: "{{ speech }}"

                            - conditions:
                                - condition: template
                                  value_template: >-
                                    {{ type == 'entrega'
                                       and code | string | trim != '' }}
                              sequence:
                                - action: script.porteiro_confirmar_entrega
                                  data:
                                    code: "{{ '' ~ (code | string | trim | upper | replace(' ', '')) }}"
                                  response_variable: confirmation

                                - choose:
                                    - conditions:
                                        - condition: template
                                          value_template: "{{ confirmation.completed | default(false) | bool }}"
                                      sequence:
                                        - variables:
                                            transcript: |-
                                              {{ transcript }}
                                              - **Sistema:** código por voz validado (`{{ code }}`)
                                              - **Porteiro:** {{ confirmation.courier_message | default('') | trim }}
                                              ---
                                              **Fim:** entrega concluída

                                        - action: script.porteiro_log
                                          data:
                                            notification_id: "{{ log_id }}"
                                            title: "{{ log_title }}"
                                            message: |-
                                              {{ transcript | trim }}

                                        - stop: entrega_concluida

                                    - conditions: []
                                      sequence:
                                        - action: conversation.process
                                          data:
                                            agent_id: "{{ agent }}"
                                            text: >-
                                              [Sistema: o código {{ code }} não foi encontrado.
                                              Peça para repetir por voz (code_method voz)
                                              ou ofereça ler pela câmera (code_method camera).]
                                            conversation_id: "{{ conversation_id }}"
                                            language: pt-BR
                                          response_variable: agent_response
                                          continue_on_error: true

                                        - variables:
                                            parsed: >-
                                              {% set raw = agent_response.response.speech.plain.speech | trim %}
                                              {% if raw.startswith('{') %}
                                                {{ raw | from_json }}
                                              {% else %}
                                                {{ {'speech': raw} }}
                                              {% endif %}
                                            speech: "{{ parsed.speech | default('Não encontrei esse código. Pode repetir?') }}"
                                            summary: "{{ parsed.summary | default('') | string | trim }}"
                                            end: "{{ parsed.end | default(false) | bool }}"

                                        - variables:
                                            transcript: |-
                                              {{ transcript }}
                                              - **Sistema:** código por voz não encontrado (`{{ code }}`)
                                              - **Porteiro:** {{ speech }}

                                        - action: script.porteiro_log
                                          data:
                                            notification_id: "{{ log_id }}"
                                            title: "{{ log_title }}"
                                            message: |-
                                              {{ transcript | trim }}

                                        - choose:
                                            - conditions:
                                                - condition: template
                                                  value_template: >-
                                                    {{ end and summary | trim != '' }}
                                              sequence:
                                                - action: script.porteiro_notificar_morador
                                                  data:
                                                    title: Porteiro - delivery
                                                    message: "{{ summary }}"

                                                - action: script.porteiro_aguardar_idle

                                                - action: assist_satellite.announce
                                                  data:
                                                    entity_id: "{{ satellite }}"
                                                    message: "{{ speech }}"
                                                    preannounce: false

                                                - action: script.porteiro_aguardar_idle

                                                - action: script.porteiro_parar_conversa

                                                - variables:
                                                    transcript: |-
                                                      {{ transcript }}
                                                      ---
                                                      **Fim:** avisou morador — {{ summary }}

                                                - action: script.porteiro_log
                                                  data:
                                                    notification_id: "{{ log_id }}"
                                                    title: "{{ log_title }}"
                                                    message: |-
                                                      {{ transcript | trim }}

                                                - stop: entrega_aviso_morador

                                            - conditions: []
                                              sequence:
                                                - variables:
                                                    next_question: "{{ speech }}"

                            - conditions:
                                - condition: template
                                  value_template: "{{ end }}"
                              sequence:
                                - action: script.porteiro_aguardar_idle

                                - action: assist_satellite.announce
                                  data:
                                    entity_id: "{{ satellite }}"
                                    message: "{{ speech }}"
                                    preannounce: false

                                - action: script.porteiro_aguardar_idle

                                - action: script.porteiro_parar_conversa

                                - variables:
                                    transcript: |-
                                      {{ transcript }}
                                      ---
                                      **Fim:** atendimento encerrado ({{ type }})

                                - action: script.porteiro_log
                                  data:
                                    notification_id: "{{ log_id }}"
                                    title: "{{ log_title }}"
                                    message: |-
                                      {{ transcript | trim }}

                                - stop: end_attendance

                            - conditions:
                                - condition: template
                                  value_template: "{{ type == 'entrega' }}"
                              sequence:
                                - variables:
                                    next_question: "{{ speech }}"

                            - conditions:
                                - condition: template
                                  value_template: "{{ type == 'visita' or type == 'geral' }}"
                              sequence:
                                - variables:
                                    next_question: "{{ speech }}"

                            - conditions: []
                              sequence:
                                - variables:
                                    next_question: "{{ speech }}"

            - conditions: []
              sequence:
                - variables:
                    transcript: |-
                      {{ transcript }}
                      - **Sistema:** não ouvi resposta do visitante

                - action: script.porteiro_log
                  data:
                    notification_id: "{{ log_id }}"
                    title: "{{ log_title }}"
                    message: |-
                      {{ transcript | trim }}

                - variables:
                    next_question: "Desculpe, não ouvi. Pode repetir?"

  - action: assist_satellite.ask_question
    data:
      entity_id: "{{ satellite }}"
      question: "Vou avisar o morador. Por favor, aguarde."
      preannounce: false
    continue_on_error: true

  - action: script.porteiro_notificar_morador
    data:
      title: "Porteiro - fim do atendimento"
      message: "Atendimento na garagem encerrado (tempo limite)."

  - variables:
      transcript: |-
        {{ transcript }}
        ---
        **Fim:** tempo limite

  - action: script.porteiro_log
    data:
      notification_id: "{{ log_id }}"
      title: "{{ log_title }}"
      message: |-
        {{ transcript | trim }}

  - action: script.porteiro_parar_conversa
