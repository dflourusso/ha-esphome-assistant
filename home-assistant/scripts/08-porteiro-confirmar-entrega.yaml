# UI: Scripts → Criar script → ⋮ → Editar em YAML — cole abaixo (sem linha id:)
# ⚙️ ID da entidade OBRIGATÓRIO: porteiro_confirmar_entrega (→ script.porteiro_confirmar_entrega)
alias: porteiro confirmar entrega
mode: single
description: Busca código na lista, notifica morador e libera entrega se encontrado.
fields:
  code:
    name: Código (summary)
    required: true
    selector:
      text:
variables:
  satellite: assist_satellite.garagem_dfltech_assistant_assist_satellite
sequence:
  - action: script.porteiro_buscar_codigo
    data:
      code: "{{ '' ~ (code | string | trim | upper | replace(' ', '')) }}"
    response_variable: search

  - choose:
      - conditions:
          - condition: template
            value_template: >-
              {{ search.found | bool
                 and not (search.already_completed | default(false) | bool) }}
        sequence:
          - action: script.porteiro_notificar_morador
            data:
              title: "Porteiro - entrega OK"
              message: >-
                Código {{ search.code }}.
                {{ search.description }}.

          - variables:
              courier_message: >-
                {% if search.keyword | trim != '' %}
                  Código confirmado. Pode deixar a encomenda na garagem.
                  Vou abrir o portão agora; ele fecha automaticamente em trinta segundos.
                  A palavra-chave é: {{ search.keyword }}.
                {% else %}
                  Código confirmado. Pode deixar a encomenda na garagem.
                  Vou abrir o portão agora; ele fecha automaticamente em trinta segundos.
                {% endif %}

          - action: script.porteiro_aguardar_idle

          - action: assist_satellite.announce
            data:
              entity_id: "{{ satellite }}"
              message: "{{ courier_message }}"
              preannounce: false

          - action: script.porteiro_aguardar_idle

          - action: script.porteiro_abrir_portao

          - action: script.porteiro_parar_conversa

          - variables:
              result:
                completed: true
                already_completed: false
                found: true
                code: "{{ search.code }}"
                courier_message: "{{ courier_message | trim }}"

          - stop: done
            response_variable: result

      - conditions:
          - condition: template
            value_template: >-
              {{ search.found | bool
                 and (search.already_completed | default(false) | bool) }}
        sequence:
          - variables:
              courier_message: >-
                {% if search.keyword | trim != '' %}
                  Esta entrega já foi realizada. A palavra-chave é: {{ search.keyword }}.
                {% else %}
                  Esta entrega já foi realizada.
                {% endif %}

          - action: script.porteiro_aguardar_idle

          - action: assist_satellite.announce
            data:
              entity_id: "{{ satellite }}"
              message: "{{ courier_message }}"
              preannounce: false

          - action: script.porteiro_aguardar_idle

          - action: script.porteiro_parar_conversa

          - variables:
              result:
                completed: true
                already_completed: true
                found: true
                code: "{{ search.code }}"
                courier_message: "{{ courier_message | trim }}"

          - stop: done
            response_variable: result

      - conditions: []
        sequence:
          - variables:
              result:
                completed: false
                already_completed: false
                found: false
                code: "{{ code }}"
                courier_message: ""

          - stop: done
            response_variable: result
